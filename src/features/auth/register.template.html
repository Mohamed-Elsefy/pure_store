<div class="relative min-h-screen flex items-center justify-center overflow-hidden">
    <canvas id="wavesCanvas" class="absolute inset-0 z-0 pointer-events-none" aria-hidden="true"></canvas>

    <div class="relative z-10 w-130 h-130 flex flex-col justify-center items-center rounded-full 
        bg-(--bg-primary)/20 backdrop-blur-[2px] border border-(--border-glass) 
        shadow-2xl transition-transform duration-700 hover:scale-[1.01] p-12">

        <div class="text-center mb-6">
            <h2 class="text-2xl font-extrabold tracking-widest uppercase">Register</h2>
            <p class="text-xs text-(--text-secondary) mt-2">Join us and start your shopping journey.</p>
        </div>

        <form class="w-full max-w-85 space-y-3" id="register-form" novalidate>
            <div id="auth-error" class="hidden bg-(--accent)/15 border border-(--accent) text-(--accent) 
                py-2 px-4 rounded-xl text-xs text-center backdrop-blur-md" role="alert">
                <span id="error-message"></span>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input name="firstName" type="text" required placeholder="First Name"
                    class="w-full px-5 py-3 rounded-full outline-none text-sm bg-(--bg-surface) border border-(--border-glass) focus:border-(--accent) transition-all">
                <input name="lastName" type="text" required placeholder="Last Name"
                    class="w-full px-5 py-3 rounded-full outline-none text-sm bg-(--bg-surface) border border-(--border-glass) focus:border-(--accent) transition-all">
            </div>

            <div class="relative group">
                <input id="email" name="email" type="email" required placeholder="Email Address"
                    class="w-full px-5 py-3 rounded-full outline-none text-sm bg-(--bg-surface) border border-(--border-glass) transition-all focus:border-(--accent)">
                <i
                    class="fas fa-envelope absolute right-5 top-3.5 text-(--text-secondary) group-focus-within:text-(--accent) transition-colors"></i>
            </div>

            <div class="relative group">
                <input id="username" name="username" type="text" required placeholder="Username"
                    class="w-full px-5 py-3 rounded-full outline-none text-sm bg-(--bg-surface) border border-(--border-glass) transition-all focus:border-(--accent)">
                <i
                    class="fas fa-user absolute right-5 top-3.5 text-(--text-secondary) group-focus-within:text-(--accent) transition-colors"></i>
            </div>

            <div class="relative group">
                <input id="password" name="password" type="password" required placeholder="Password"
                    class="w-full px-5 py-3 rounded-full outline-none text-sm bg-(--bg-surface) border border-(--border-glass) transition-all focus:border-(--accent)">
                <i
                    class="fas fa-lock absolute right-5 top-3.5 text-(--text-secondary) group-focus-within:text-(--accent) transition-colors"></i>
            </div>

            <button type="submit" id="register-btn" data-original-text="CREATE ACCOUNT"
                class="w-full py-3 bg-(--accent) hover:brightness-110 text-white font-bold rounded-full transition-all transform active:scale-95 shadow-2xl text-sm tracking-widest">
                <span id="btn-text">CREATE ACCOUNT</span>
            </button>
        </form>

        <div class="mt-4 text-center">
            <p class="text-[10px] uppercase tracking-widest text-(--text-secondary)">
                Already have an account?
                <a href="#/login" class="ml-1 font-bold text-(--accent) hover:underline transition-all">Sign In</a>
            </p>
        </div>
    </div>
</div>
