<div class="relative min-h-screen flex items-center justify-center overflow-hidden">

    <canvas id="wavesCanvas" class="absolute inset-0 z-0 pointer-events-none"></canvas>

    <div class="relative z-10 w-[450px] h-[450px] flex flex-col justify-center items-center rounded-full 
                /* تأثير الزجاج الأساسي */
                bg-white/[0.03] backdrop-blur-[15px] 
                /* حواف لامعة رقيقة */
                border border-white/10 
                /* ظل عميق لإعطاء بعد للعنصر */
                shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] 
                /* تأثيرات الحركة */
                transition-transform duration-700 hover:scale-[1.02] p-12">

        <div class="text-center mb-6">
            <h2 class="text-2xl font-extrabold tracking-widest text-white uppercase opacity-90">Login</h2>
        </div>

        <form class="w-full max-w-[280px] space-y-5" id="login-form">
            <div id="auth-error"
                class="hidden bg-red-500/10 border border-red-500/50 text-red-200 px-3 py-2 rounded-xl text-[10px] text-center backdrop-blur-md">
                <span id="error-message"></span>
            </div>

            <div class="space-y-4">
                <div class="relative group">
                    <input name="username" type="text" required placeholder="Username"
                        class="w-full px-5 py-3 rounded-full outline-none text-white text-sm placeholder:text-gray-500
                               bg-white/[0.07] border border-white/10 transition-all duration-300
                               focus:bg-white/[0.12] focus:border-[var(--accent)] focus:ring-1 focus:ring-[var(--accent)]/30">
                    <i class="fas fa-user absolute right-5 top-3.5 text-gray-500 group-focus-within:text-[var(--accent)] transition-colors"></i>
                </div>

                <div class="relative group">
                    <input name="password" type="password" required placeholder="••••••••"
                        class="w-full px-5 py-3 rounded-full outline-none text-white text-sm placeholder:text-gray-500
                               bg-white/[0.07] border border-white/10 transition-all duration-300
                               focus:bg-white/[0.12] focus:border-[var(--accent)] focus:ring-1 focus:ring-[var(--accent)]/30">
                    <i class="fas fa-lock absolute right-5 top-3.5 text-gray-500 group-focus-within:text-[var(--accent)] transition-colors"></i>
                </div>
            </div>

            <button type="submit" id="login-btn"
                class="w-full py-3 bg-[var(--accent)] hover:brightness-110 text-white font-bold rounded-full 
                       transition-all transform active:scale-95 shadow-lg shadow-[var(--accent)]/20 text-sm tracking-widest">
                <span id="btn-text">SIGN IN</span>
            </button>

            <div class="flex justify-between items-center w-full px-2 text-[10px] text-gray-400">
                <label class="flex items-center cursor-pointer hover:text-white transition-colors">
                    <input type="checkbox" class="mr-1.5 accent-[var(--accent)]"> Remember me
                </label>
                <a href="#" class="hover:text-white transition-colors">Forgot password?</a>
            </div>
        </form>
    </div>
</div>
