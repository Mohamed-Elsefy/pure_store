<!-- src/feature/auth/login.template.html -->

<div class="relative min-h-screen flex items-center justify-center overflow-hidden">

    <!-- Background Canvas -->
    <canvas id="wavesCanvas" class="absolute inset-0 z-0 pointer-events-none" aria-hidden="true"></canvas>

    <!-- Glass Card -->
    <div class="relative z-10 w-120 h-120 flex flex-col justify-center items-center rounded-full 
        bg-(--bg-primary)/20 backdrop-blur-[2px] border border-(--border-glass) 
        shadow-2xl transition-transform duration-700 hover:scale-[1.02] p-12">

        <!-- Title -->
        <div class="text-center mb-6">
            <h2 class="text-2xl font-extrabold tracking-widest uppercase">
                Login
            </h2>
            <p class="text-xs text-(--text-secondary) mt-2">
                Welcome back! Please enter your credentials.
            </p>
        </div>

        <!-- Form -->
        <form class="w-full max-w-70 space-y-5" id="login-form" novalidate>

            <!-- Error Message -->
            <div id="auth-error" class="hidden bg-(--accent)/15 border border-(--accent) text-(--accent) 
                py-2 px-4 rounded-xl text-xs text-center backdrop-blur-md" role="alert">
                <span id="error-message"></span>
            </div>

            <!-- Username -->
            <div class="relative group">
                <label for="username" class="sr-only">Username</label>
                <input id="username" name="username" type="text" required autocomplete="username" placeholder="Username"
                    class="w-full px-5 py-3 rounded-full outline-none text-sm
                    placeholder:text-(--text-secondary)
                    bg-(--bg-surface)
                    border border-(--border-glass)
                    transition-all duration-300
                    focus:border-(--accent)
                    focus:ring-2 focus:ring-(--accent)/30">

                <i class="fas fa-user absolute right-5 top-3.5 
                    text-(--text-secondary)
                    group-focus-within:text-(--accent)
                    transition-colors"></i>
            </div>

            <!-- Password -->
            <div class="relative group">
                <label for="password" class="sr-only">Password</label>
                <input id="password" name="password" type="password" required autocomplete="current-password"
                    placeholder="••••••••" class="w-full px-5 py-3 rounded-full outline-none text-sm
                    placeholder:text-(--text-secondary)
                    bg-(--bg-surface)
                    border border-(--border-glass)
                    transition-all duration-300
                    focus:border-(--accent)
                    focus:ring-2 focus:ring-(--accent)/30">

                <i class="fas fa-lock absolute right-5 top-3.5 
                    text-(--text-secondary)
                    group-focus-within:text-(--accent)
                    transition-colors"></i>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="login-btn" class="w-full py-3 bg-(--accent) hover:brightness-110
                text-white font-bold rounded-full
                transition-all transform active:scale-95
                shadow-2xl shadow-(--accent)/20
                text-sm tracking-widest
                disabled:opacity-50 disabled:cursor-not-allowed">

                <span id="btn-text">SIGN IN</span>
            </button>

        </form>

        <!-- register button -->
        <div class="mt-6 text-center">
            <p class="text-[10px] uppercase tracking-widest text-(--text-secondary)">
                Don't have an account?
                <a href="#/register" class="ml-1 font-bold text-(--accent) hover:underline transition-all">
                    Create Account
                </a>
            </p>
        </div>

    </div>
</div>
