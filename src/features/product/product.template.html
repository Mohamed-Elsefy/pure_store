<section class="max-w-7xl mx-auto px-4 pt-5">

    <div id="product-details" class="grid grid-cols-1 md:grid-cols-2 gap-12">

        <!-- Images -->
        <div class="grid grid-cols-1 sm:grid-cols-[auto_1fr] gap-4 items-center">

            <div
                class="aspect-square rounded-3xl overflow-hidden bg-(--bg-surface) border border-(--border-glass) order-1 sm:order-2">
                <img id="main-image" alt="" class="w-full h-full object-contain transition-all duration-500">
            </div>

            <div id="thumbnails"
                class="flex flex-row sm:flex-col gap-3 order-2 sm:order-1 overflow-x-auto sm:overflow-y-auto">

                <template id="thumbnail-item-template">
                    <img
                        class="thumb w-20 h-20 object-contain cursor-pointer rounded-xl border border-(--border-glass) hover:border-(--accent) transition-all">
                </template>

            </div>


        </div>

        <!-- Info -->
        <div class="space-y-6">

            <p class="text-xs uppercase tracking-widest text-(--text-secondary)">
                {{category}}
            </p>

            <h1 class="text-3xl font-black font-(family-name:--fsecond)">
                {{title}}
            </h1>

            <div class="flex items-center gap-4">
                <div>
                    <i class="fa-solid fa-star text-(--accent)"></i>
                    <span class="font-bold">{{rating}}</span>
                </div>
                <span class="text-sm text-(--text-secondary)">
                    ({{stock}} in stock)
                </span>
            </div>

            <div class="text-4xl font-extrabold text-(--accent)">
                ${{price}}
            </div>

            <p class="leading-relaxed text-(--text-secondary)">
                {{description}}
            </p>

            <button
                class="w-full py-3 rounded-2xl border border-(--accent) text-(--accent) hover:bg-(--accent) hover:text-white transition-all">
                Add to Cart
            </button>

        </div>

    </div>
</section>
