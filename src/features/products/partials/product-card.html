<!-- src/features/products/partials/product-card.html -->

<div class="group relative flex flex-col p-4 transition-all duration-500 hover:-translate-y-3" style="background: var(--bg-surface); 
            backdrop-filter: var(--glass-blur); 
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-glass); 
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0, 0, 0, 0.05);">

    <div class="relative aspect-3/4 overflow-hidden rounded-2xl mb-5"
        style="background: rgba(0, 0, 0, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);">

        <img src="{{image}}" alt="{{title}}"
            class="w-full h-full object-contain p-4 group-hover:scale-110 transition-transform duration-700 ease-out"
            style="mix-blend-mode: multiply; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));">

        <button data-id="{{id}}"
            class="add-to-cart-btn absolute bottom-3 left-3 right-3 py-3 rounded-xl opacity-0 group-hover:opacity-100 translate-y-4 group-hover:translate-y-0 transition-all duration-300 uppercase text-[10px] tracking-[0.2em] font-black"
            style="background: var(--accent); color: #FFFFFF; box-shadow: 0 10px 20px rgba(177, 64, 42, 0.3);">
            Add to Cart
        </button>
    </div>

    <div class="space-y-2 px-1">
        <div class="flex flex-col gap-1">
            <p class="text-[9px] uppercase tracking-[0.25em] opacity-60" style="color: var(--text-secondary);">
                {{brand}} • {{category}}
            </p>

            <div class="flex justify-between items-end">
                <h3 class="text-base font-bold truncate pr-2"
                    style="font-family: var(--fsecond); color: var(--text-primary); letter-spacing: -0.02em;">
                    {{title}}
                </h3>
                <span class="text-lg font-black" style="color: var(--accent);">
                    ${{price}}
                </span>
            </div>
        </div>

        <div class="absolute inset-0 rounded-3xl pointer-events-none transition-opacity duration-500 opacity-0 group-hover:opacity-100"
            style="background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%); border: 1px solid rgba(255,255,255,0.2);">
        </div>
    </div>
</div>
