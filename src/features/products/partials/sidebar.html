<!-- Sidebar Filters Section -->
<!-- This template represents the filtering sidebar on the Products page -->

<section class="space-y-12">

    <!-- Sidebar Title -->
    <!-- Main heading for the filtering panel -->
    <div class="pb-4 border-b border-(--border-glass)">
        <h2 class="text-2xl font-black uppercase tracking-widest text-(--accent) font-(family-name:--fsecond)">
            Filtering
        </h2>
    </div>

    <!-- Sort Section -->
    <!-- Custom dropdown used to sort products -->
    <div class="group">
        <h3 class="text-sm font-bold uppercase tracking-wider text-(--text-secondary) mb-4 flex items-center gap-2">
            <span class="w-4 h-px bg-(--accent)"></span>
            Sort By
        </h3>

        <!-- Custom dropdown wrapper -->
        <div class="relative custom-dropdown" id="sort-dropdown-wrapper">

            <!-- Dropdown trigger button -->
            <!-- Displays the currently selected sort option -->
            <button id="dropdown-trigger" class="w-full flex items-center justify-between backdrop-blur-md
                       border border-(--border-glass) rounded-2xl p-4
                       text-xs font-semibold tracking-widest transition-all
                       hover:border-(--accent)/50 focus:ring-2
                       focus:ring-(--accent)/20 outline-none
                       bg-(--bg-surface)/40">
                <span id="selected-sort-label">Default Selection</span>

                <!-- Dropdown arrow icon -->
                <i class="fa-solid fa-angle-down transition-transform duration-300 text-(--accent)"></i>
            </button>

            <!-- Dropdown menu -->
            <!-- Each item represents a sorting strategy -->
            <ul id="dropdown-menu" class="absolute w-full mt-2 py-2 hidden flex-col
                       border border-(--border-glass) rounded-2xl
                       shadow-2xl z-50 bg-(--bg-surface)
                       overflow-hidden transform origin-top
                       transition-all duration-300">

                <li class="sort-option px-5 py-3 text-xs hover:bg-(--accent)/10
                           cursor-pointer transition-colors" data-value="">
                    Default Selection
                </li>

                <li class="sort-option px-5 py-3 text-xs hover:bg-(--accent)/10
                           cursor-pointer transition-colors" data-value="price-asc">
                    Price: Low to High
                </li>

                <li class="sort-option px-5 py-3 text-xs hover:bg-(--accent)/10
                           cursor-pointer transition-colors" data-value="price-desc">
                    Price: High to Low
                </li>

                <li class="sort-option px-5 py-3 text-xs hover:bg-(--accent)/10
                           cursor-pointer transition-colors" data-value="rating-desc">
                    Top Rated
                </li>

                <li class="sort-option px-5 py-3 text-xs hover:bg-(--accent)/10
                           cursor-pointer transition-colors" data-value="created-desc">
                    Newest
                </li>

                <li class="sort-option px-5 py-3 text-xs hover:bg-(--accent)/10
                           cursor-pointer transition-colors" data-value="title-asc">
                    A to Z
                </li>
            </ul>
        </div>
    </div>

    <!-- Categories Section -->
    <!-- List of product categories populated dynamically -->
    <div>
        <h3 class="text-sm font-bold uppercase tracking-wider text-(--text-secondary) mb-4 flex items-center gap-2">
            <span class="w-4 h-px bg-(--accent)"></span>
            Categories
        </h3>

        <!-- Categories container -->
        <!-- Category items are injected via ProductsView.renderCategories -->
        <ul id="categories-list" class="relative">

            <!-- Category item template -->
            <!-- Used by JavaScript to clone and render each category -->
            <template id="category-item-template">
                <li class="category-item group flex items-center justify-between
                           p-3 rounded-xl transition-all cursor-pointer
                           border border-transparent hover:border-(--accent)">

                    <!-- Category name -->
                    <span class="category-name text-sm font-medium tracking-tight
                               group-hover:translate-x-1
                               transition-transform duration-300">
                    </span>

                    <!-- Active indicator dot -->
                    <div class="w-1.5 h-1.5 rounded-full scale-0
                               group-hover:scale-100
                               transition-transform duration-300
                               bg-(--accent)">
                    </div>
                </li>
            </template>
        </ul>
    </div>

    <!-- Price Range Section -->
    <!-- Allows filtering products by minimum and maximum price -->
    <div>
        <h3 class="text-sm font-bold uppercase tracking-wider text-(--text-secondary) mb-4 flex items-center gap-2">
            <span class="w-4 h-px bg-(--accent)"></span>
            Price Range
        </h3>

        <!-- Min / Max price inputs -->
        <div class="grid grid-cols-2 gap-4">
            <div class="relative">
                <input type="number" id="min-price" placeholder="Min" min="0"
                    class="w-full backdrop-blur-md border border-(--accent)/40
                        rounded-xl p-3 text-xs outline-none focus:border-(--accent) transition-colors placeholder:text-(--text-secondary)">
            </div>

            <div class="relative">
                <input type="number" id="max-price" placeholder="Max" min="0"
                    class="w-full backdrop-blur-md border border-(--accent)/40
                        rounded-xl p-3 text-xs outline-none focus:border-(--accent) transition-colors placeholder:text-(--text-secondary)">
            </div>
        </div>
    </div>

    <!-- Reset Filters Button -->
    <!-- Clears all active filters and sorting -->
    <div>
        <button id="reset-filters" class="w-full py-4 rounded-2xl text-xs text-(--accent)
                   uppercase tracking-widest transition-all duration-500
                   hover:shadow-md hover:scale-95
                   border border-(--accent)">
            Clear Filters
        </button>
    </div>

</section>
