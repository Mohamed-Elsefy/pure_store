<!-- Products Page Template -->

<button id="sidebar-toggle" class="md:hidden p-2 m-4 bg-primary text-white rounded">
    ☰ Filters
</button>

<div class="flex">
    <!-- Sidebar -->
    <aside id="sidebar-container"
        class="fixed top-0 left-0 h-full w-64 bg-white dark:bg-gray-800 transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-50 md:relative md:block p-4 overflow-y-auto">
    </aside>

    <!-- المحتوى -->
    <main id="grid-container" class="flex-1 md:ml-0 ml-0 p-4">
        <!-- منتجات -->
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-12"></div>

        <!-- Pagination ثابت -->
        <div id="pagination-wrapper" class="flex justify-center items-center gap-4 mt-6">
            <button id="pagination-prev" class="px-4 py-2 border rounded hover:bg-gray-200 disabled:opacity-50">
                Previous
            </button>
            <span id="pagination-info" class="px-2 text-sm text-gray-700 dark:text-gray-300">
                Page 1 of 1
            </span>
            <button id="pagination-next" class="px-4 py-2 border rounded hover:bg-gray-200 disabled:opacity-50">
                Next
            </button>
        </div>
    </main>

</div>

<!-- خلفية شفافة عند فتح السايدبار على الهاتف -->
<div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40 md:hidden"></div>
